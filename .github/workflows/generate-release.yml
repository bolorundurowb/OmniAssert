name: Generate Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: generate-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-release:
    name: Generate Release
    # workflow_dispatch: choose branch "master" in the UI; other refs are skipped.
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Resolve and validate package version
        id: version
        run: |
          set -euo pipefail
          VERSION_FILE="Directory.Build.props"
          if [[ ! -f "$VERSION_FILE" ]]; then
            echo "::error::Version file not found: $VERSION_FILE"
            exit 1
          fi

          CURRENT="$(sed -n 's/^[[:space:]]*<Version>\([^<]*\)<\/Version>/\1/p' "$VERSION_FILE" | head -1 | xargs)"

          if [[ -z "$CURRENT" ]]; then
            echo "::error::Could not parse <Version> from $VERSION_FILE"
            exit 1
          fi

          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Version '$CURRENT' is malformed (expected semver such as 1.2.3 or 1.2.3-alpha.1)"
            exit 1
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Package version: $CURRENT"

      - name: Detect version change
        id: bump
        run: |
          set -euo pipefail
          VERSION_FILE="Directory.Build.props"
          CURRENT="${{ steps.version.outputs.current }}"

          PREV_REF=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              PREV_REF="$BEFORE"
            elif git rev-parse HEAD~1 >/dev/null 2>&1; then
              PREV_REF="HEAD~1"
            fi
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV_REF="HEAD~1"
          fi

          PREVIOUS=""
          if [[ -n "$PREV_REF" ]]; then
            PREV_TEXT="$(git show "${PREV_REF}:${VERSION_FILE}" 2>/dev/null || true)"
            PREVIOUS="$(printf '%s' "$PREV_TEXT" | sed -n 's/^[[:space:]]*<Version>\([^<]*\)<\/Version>/\1/p' | head -1 | xargs)"
          fi

          echo "previous=${PREVIOUS:-}" >> "$GITHUB_OUTPUT"
          echo "Compared against: ${PREV_REF:-<no parent>}  Previous <Version>: ${PREVIOUS:-<none>}"

          if [[ -n "$PREVIOUS" && "$PREVIOUS" == "$CURRENT" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change; exiting."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version change: '${PREVIOUS:-<none>}' -> '$CURRENT'"
          fi

      - name: Exit when version unchanged
        if: steps.bump.outputs.changed != 'true'
        run: echo "No release: <Version> in Directory.Build.props unchanged or could not compare."

      - name: Check if release tag already exists
        id: tag
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.current }}"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists on origin; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is free; will build and publish."
          fi

      - name: Exit when tag already exists
        if: steps.bump.outputs.changed == 'true' && steps.tag.outputs.exists == 'true'
        run: echo "No release: tag already published."

      - name: Restore and pack (Release)
        id: pack
        if: steps.bump.outputs.changed == 'true' && steps.tag.outputs.exists == 'false'
        working-directory: src
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/nupkg"
          mkdir -p "$OUT"
          dotnet restore OmniAssert.slnx
          dotnet pack OmniAssert.Core/OmniAssert.Core.csproj \
            --configuration Release \
            --no-restore \
            --output "$OUT" \
            -p:ContinuousIntegrationBuild=true

          mapfile -t pkgs < <(find "$OUT" -maxdepth 1 -name '*.nupkg' -type f | sort)
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "::error::Pack produced no .nupkg under $OUT"
            ls -la "$OUT" || true
            exit 1
          fi
          echo "Packaged ${#pkgs[@]} file(s):"
          printf '  %s\n' "${pkgs[@]}"
          echo "out_dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.bump.outputs.changed == 'true' && steps.tag.outputs.exists == 'false'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Create GitHub release and upload packages
        if: steps.bump.outputs.changed == 'true' && steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          OUT="${{ steps.pack.outputs.out_dir }}"
          mapfile -t pkgs < <(find "$OUT" -maxdepth 1 -name '*.nupkg' -type f | sort)

          PRERELEASE=( )
          if [[ "$VERSION" == *"-alpha"* || "$VERSION" == *"-beta"* || "$VERSION" == *"-rc"* ]]; then
            PRERELEASE=(--prerelease)
          fi

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          if gh api --method POST "repos/${{ github.repository }}/releases/generate-notes" \
              -f "tag_name=${TAG}" \
              -f "target_commitish=master" \
              --jq .body > "$NOTES_FILE" 2>/dev/null && [[ -s "$NOTES_FILE" ]]; then
            echo "Using GitHub-generated release notes."
          else
            echo "::warning::Release notes API unavailable or empty; using recent commit subjects."
            {
              echo "## Commits"
              echo
              git log --oneline -n 50
            } > "$NOTES_FILE"
          fi

          gh release create "$TAG" "${pkgs[@]}" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            "${PRERELEASE[@]}" \
            --verify-tag
